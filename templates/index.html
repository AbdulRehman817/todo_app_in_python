{% for task in tasks %}
<div class="task">
  <div class="task-left">
    <span class="task-title {% if task.done %}done{% endif %}">
      {{ task.title }}
    </span>
  </div>
  <div class="task-actions">
    <a class="btn-done" href="/done/{{ task.id }}">
      {% if task.done %} Undo {% else %} Done {% endif %}
    </a>
    <a class="btn-delete" href="/delete/{{ task.id }}">Delete</a>
  </div>
</div>
{% endfor %}
